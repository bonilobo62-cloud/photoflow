<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>PhotoFlow - Visor de Fotos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
        }

        #uploadScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            overflow-y: auto;
        }

        .upload-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            margin: 10px 0;
        }

        .upload-box h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .upload-box p {
            color: #666;
            margin-bottom: 30px;
        }

        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            margin: 10px;
            width: 100%;
            max-width: 300px;
            transition: transform 0.3s;
        }

        .upload-btn:hover {
            transform: translateY(-3px);
        }

        .upload-btn.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        #fileInput, #folderInput {
            display: none;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .option-card {
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
            border-radius: 15px;
            padding: 25px 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-card:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-3px);
        }

        .option-card .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .option-card h3 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .option-card p {
            color: #666;
            font-size: 0.85em;
        }

        #historySection {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px 20px;
            max-width: 500px;
            width: 100%;
            margin: 10px 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        #historySection h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .history-list {
            display: grid;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .history-item:hover {
            background: rgba(102, 126, 234, 0.2);
            transform: translateX(5px);
        }

        .history-item .folder-icon {
            font-size: 2em;
        }

        .history-item .folder-info {
            flex: 1;
            text-align: left;
        }

        .history-item .folder-name {
            color: #333;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .history-item .folder-date {
            color: #666;
            font-size: 0.8em;
        }

        .history-item .delete-btn {
            background: #f5576c;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
        }

        .no-history {
            text-align: center;
            color: #666;
            padding: 30px;
        }

        #viewer {
            display: none;
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px 15px 15px;
            display: none;
        }

        #viewer:hover #controls, #controls.visible {
            display: block;
        }

        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            cursor: pointer;
            min-width: 100px;
            max-width: 200px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .speed-control input[type="range"] {
            width: 80px;
        }

        #musicControl {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 25px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        #musicControl.visible {
            display: flex;
        }

        .music-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.3em;
            cursor: pointer;
        }

        .counter {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            padding: 12px 18px;
            border-radius: 20px;
            display: none;
            flex-direction: column;
            gap: 5px;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .counter.visible {
            display: flex;
        }

        .counter-number {
            font-weight: bold;
            color: #667eea;
        }

        .counter-folder {
            color: rgba(255,255,255,0.8);
            font-size: 0.85em;
            text-align: center;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .upload-box, #historySection {
                padding: 30px 20px;
            }
            
            .upload-box h1 {
                font-size: 1.6em;
            }
            
            .control-btn {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>

    <div id="uploadScreen">
        <div class="upload-box">
            <h1>📸 PhotoFlow</h1>
            <p>Carga fotos desde tu dispositivo</p>
            
            <div class="options-grid">
                <div class="option-card" onclick="document.getElementById('folderInput').click()">
                    <div class="icon">📁</div>
                    <h3>Cargar Carpeta</h3>
                    <p>Selecciona una carpeta completa</p>
                </div>
                
                <div class="option-card" onclick="document.getElementById('fileInput').click()">
                    <div class="icon">🖼️</div>
                    <h3>Cargar Fotos</h3>
                    <p>Selecciona fotos individuales</p>
                </div>
            </div>
            
            <input type="file" id="fileInput" multiple accept="image/*">
            <input type="file" id="folderInput" webkitdirectory directory multiple>
            
            <div style="margin-top: 20px;">
                <button class="upload-btn secondary" onclick="document.getElementById('musicInput').click()">
                    🎵 Agregar Música
                </button>
                <input type="file" id="musicInput" accept="audio/*">
            </div>
            
            <div id="fileCount" style="margin-top: 20px; color: #666;"></div>
        </div>

        <div id="historySection">
            <h2>📚 Historial de Carpetas</h2>
            <div class="history-list" id="historyList">
                <div class="no-history">No hay carpetas en el historial</div>
            </div>
        </div>
    </div>

    <div id="viewer">
        <div id="slidesContainer"></div>
        
        <div class="counter" id="counter">
            <div class="counter-number">1 / 1</div>
            <div class="counter-folder">📁 Carpeta</div>
        </div>
        
        <div id="musicControl">
            <span id="musicName">🎵</span>
            <button class="music-btn" onclick="toggleMusic()" id="musicBtn">▶</button>
        </div>
        
        <div id="controls">
            <div class="controls-wrapper">
                <button class="control-btn" onclick="previousSlide()">⏮</button>
                <button class="control-btn" onclick="togglePlay()" id="playBtn">⏸</button>
                <button class="control-btn" onclick="nextSlide()">⏭</button>
                
                <div class="progress-bar" onclick="seekTo(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                
                <div class="speed-control">
                    <span>🐢</span>
                    <input type="range" id="speedRange" min="1" max="10" value="5">
                    <span>🐇</span>
                    <span id="speedValue">5s</span>
                </div>
                
                <button class="control-btn" onclick="toggleFullscreen()">⛶</button>
                <button class="control-btn" onclick="shuffleSlides()">🔀</button>
                <button class="control-btn" onclick="backToHome()">🏠</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" loop></audio>

    <script>
        let images = [];
        let currentIndex = 0;
        let isPlaying = true;
        let slideInterval;
        let slideDuration = 5000;
        let isShuffled = false;
        let originalImages = [];
        let currentFolderName = '';
        let db;

        const uploadScreen = document.getElementById('uploadScreen');
        const viewer = document.getElementById('viewer');
        const fileInput = document.getElementById('fileInput');
        const folderInput = document.getElementById('folderInput');
        const musicInput = document.getElementById('musicInput');
        const slidesContainer = document.getElementById('slidesContainer');
        const playBtn = document.getElementById('playBtn');
        const speedRange = document.getElementById('speedRange');
        const speedValue = document.getElementById('speedValue');
        const counter = document.getElementById('counter');
        const musicControl = document.getElementById('musicControl');
        const audioPlayer = document.getElementById('audioPlayer');
        const progressFill = document.getElementById('progressFill');
        const historyList = document.getElementById('historyList');

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('PhotoFlowDB', 1);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains('folders')) {
                        database.createObjectStore('folders', { keyPath: 'id', autoIncrement: true });
                    }
                };
            });
        }

        async function saveFolderToHistory(folderName, imagesData) {
            const transaction = db.transaction(['folders'], 'readwrite');
            const store = transaction.objectStore('folders');
            
            store.add({
                name: folderName,
                date: new Date().toISOString(),
                images: imagesData
            });
        }

        function getHistory() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['folders'], 'readonly');
                const store = transaction.objectStore('folders');
                const request = store.getAll();
                
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function deleteFromHistory(id) {
            const transaction = db.transaction(['folders'], 'readwrite');
            const store = transaction.objectStore('folders');
            store.delete(id);
        }

        async function loadHistory() {
            const history = await getHistory();
            
            if (history.length === 0) {
                historyList.innerHTML = '<div class="no-history">No hay carpetas en el historial</div>';
                return;
            }
            
            historyList.innerHTML = '';
            history.reverse().forEach(folder => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div class="folder-icon">📁</div>
                    <div class="folder-info">
                        <div class="folder-name">${folder.name}</div>
                        <div class="folder-date">${new Date(folder.date).toLocaleDateString('es-ES')}</div>
                    </div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteHistoryItem(${folder.id})">✕</button>
                `;
                item.onclick = () => loadFromHistory(folder);
                historyList.appendChild(item);
            });
        }

        async function loadFromHistory(folder) {
            currentFolderName = folder.name;
            
            images = await Promise.all(folder.images.map(async (imgData) => {
                const blob = new Blob([imgData.data], { type: imgData.type || 'image/jpeg' });
                return new File([blob], imgData.name, { type: imgData.type || 'image/jpeg' });
            }));
            
            originalImages = [...images];
            startViewer();
        }

        async function deleteHistoryItem(id) {
            deleteFromHistory(id);
            loadHistory();
        }

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            currentFolderName = 'Fotos seleccionadas';
            loadImages(files);
        });

        folderInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if (files.length > 0) {
                const path = files[0].webkitRelativePath;
                currentFolderName = path.split('/')[0];
            }
            loadImages(files);
        });

        musicInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                audioPlayer.src = URL.createObjectURL(file);
                document.getElementById('musicName').textContent = '🎵 ' + file.name.substring(0, 15);
                musicControl.classList.add('visible');
                audioPlayer.play();
            }
        });

        async function loadImages(files) {
            if (files.length === 0) {
                alert('No se encontraron imágenes');
                return;
            }

            images = files;
            originalImages = [...files];
            
            document.getElementById('fileCount').textContent = `${files.length} fotos cargadas`;
            
            const imagesData = await Promise.all(files.map(async file => ({
                data: await file.arrayBuffer(),
                name: file.name,
                type: file.type
            })));
            
            await saveFolderToHistory(currentFolderName, imagesData);
            setTimeout(startViewer, 500);
        }

        function startViewer() {
            uploadScreen.style.display = 'none';
            viewer.style.display = 'block';
            counter.classList.add('visible');
            updateCounterDisplay();
            createSlides();
            showSlide(0);
            startSlideshow();
        }

        function createSlides() {
            slidesContainer.innerHTML = '';
            images.forEach((image, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.innerHTML = `<img src="${URL.createObjectURL(image)}" alt="${image.name}">`;
                slidesContainer.appendChild(slide);
            });
        }

        function showSlide(index) {
            const slides = document.querySelectorAll('.slide');
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
            });
            currentIndex = index;
            updateCounterDisplay();
            updateProgress();
        }

        function nextSlide() {
            showSlide((currentIndex + 1) % images.length);
        }

        function previousSlide() {
            showSlide((currentIndex - 1 + images.length) % images.length);
        }

        function startSlideshow() {
            isPlaying = true;
            playBtn.textContent = '⏸';
            slideInterval = setInterval(nextSlide, slideDuration);
        }

        function togglePlay() {
            if (isPlaying) {
                clearInterval(slideInterval);
                playBtn.textContent = '▶';
                isPlaying = false;
            } else {
                startSlideshow();
            }
        }

        function toggleMusic() {
            if (audioPlayer.paused) {
                audioPlayer.play();
                document.getElementById('musicBtn').textContent = '⏸';
            } else {
                audioPlayer.pause();
                document.getElementById('musicBtn').textContent = '▶';
            }
        }

        function shuffleSlides() {
            isShuffled = !isShuffled;
            if (isShuffled) {
                for (let i = images.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [images[i], images[j]] = [images[j], images[i]];
                }
            } else {
                images = [...originalImages];
            }
            createSlides();
            showSlide(0);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function seekTo(event) {
            const bar = event.currentTarget;
            const clickPosition = event.offsetX / bar.offsetWidth;
            showSlide(Math.floor(clickPosition * images.length));
        }

        function updateProgress() {
            progressFill.style.width = `${((currentIndex + 1) / images.length) * 100}%`;
        }

        function updateCounterDisplay() {
            counter.innerHTML = `
                <div class="counter-number">${currentIndex + 1} / ${images.length}</div>
                <div class="counter-folder">📁 ${currentFolderName}</div>
            `;
        }

        function backToHome() {
            clearInterval(slideInterval);
            viewer.style.display = 'none';
            uploadScreen.style.display = 'flex';
            loadHistory();
        }

        document.addEventListener('keydown', (e) => {
            if (viewer.style.display === 'none') return;
            
            switch(e.key) {
                case 'ArrowRight': nextSlide(); break;
                case 'ArrowLeft': previousSlide(); break;
                case ' ': togglePlay(); break;
                case 'f': toggleFullscreen(); break;
                case 'm': toggleMusic(); break;
                case 'Escape': 
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        backToHome();
                    }
                    break;
            }
        });

        let touchStartX = 0;
        let touchEndX = 0;

        viewer.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        viewer.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                diff > 0 ? nextSlide() : previousSlide();
            }
        });

        let controlsTimeout;
        viewer.addEventListener('mousemove', () => {
            document.getElementById('controls').classList.add('visible');
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (isPlaying) document.getElementById('controls').classList.remove('visible');
            }, 3000);
        });

        speedRange.addEventListener('input', (e) => {
            slideDuration = (11 - e.target.value) * 1000;
            speedValue.textContent = e.target.value + 's';
            if (isPlaying) {
                clearInterval(slideInterval);
                slideInterval = setInterval(nextSlide, slideDuration);
            }
        });

        initDB().then(loadHistory).catch(console.error);
    </script>
</body>
</html>
