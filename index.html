<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>PhotoFlow - Visor de Fotos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
        }

        /* Pantalla de inicio */
        #uploadScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: opacity 0.5s ease;
            overflow-y: auto;
            padding: 20px;
        }

        .upload-box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            margin: 20px 0;
        }

        .upload-box h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .upload-box p {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin: 10px;
            display: inline-block;
            width: 100%;
            max-width: 300px;
        }

        .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .upload-btn:active {
            transform: scale(0.95);
        }

        .upload-btn.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        #fileInput, #folderInput {
            display: none;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .option-card {
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
            border-radius: 15px;
            padding: 25px 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-card:hover, .option-card:active {
            background: rgba(102, 126, 234, 0.2);
            transform: translateY(-3px);
        }

        .option-card .icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .option-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .option-card p {
            color: #666;
            font-size: 0.85em;
        }

        /* Historial */
        #historySection {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px 20px;
            max-width: 500px;
            width: 100%;
            margin: 20px 0;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        #historySection.visible {
            display: block;
        }

        #historySection h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .history-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .history-item:hover, .history-item:active {
            background: rgba(102, 126, 234, 0.2);
        }

        .history-item .folder-icon {
            font-size: 2em;
        }

        .history-item .folder-info {
            flex: 1;
            text-align: left;
        }

        .history-item .folder-name {
            color: #333;
            font-weight: bold;
            margin-bottom: 5px;
            word-wrap: break-word;
            font-size: 0.95em;
        }

        .history-item .folder-date {
            color: #666;
            font-size: 0.75em;
        }

        .history-item .delete-btn {
            background: #f5576c;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .no-history {
            text-align: center;
            color: #666;
            padding: 30px;
            font-style: italic;
        }

        /* Visor de fotos */
        #viewer {
            display: none;
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Controles */
        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px 15px 15px;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #viewer:hover #controls,
        #controls.visible {
            display: block;
            opacity: 1;
        }

        .controls-wrapper {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover, .control-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            cursor: pointer;
            min-width: 100px;
            max-width: 200px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        .speed-control input[type="range"] {
            width: 80px;
        }

        /* Reproductor de música */
        #musicControl {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 25px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            font-size: 0.9em;
        }

        #musicControl.visible {
            display: flex;
        }

        .music-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.3em;
            cursor: pointer;
        }

        /* Contador */
        .counter {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.85em;
            display: none;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .counter.visible {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }

        .counter-number {
            font-weight: bold;
            color: #667eea;
            font-size: 1em;
        }

        .counter-folder {
            color: rgba(255,255,255,0.8);
            font-size: 0.8em;
            text-align: center;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Responsive para móviles */
        @media (max-width: 768px) {
            .upload-box, #historySection {
                padding: 30px 20px;
                margin: 10px;
            }
            
            .upload-box h1 {
                font-size: 1.6em;
            }
            
            .upload-box p {
                font-size: 0.9em;
            }
            
            .option-card {
                padding: 20px 15px;
            }
            
            .option-card .icon {
                font-size: 2em;
            }
            
            .controls-wrapper {
                gap: 8px;
            }
            
            .control-btn {
                width: 40px;
                height: 40px;
                font-size: 1em;
            }
            
            .counter {
                padding: 10px 15px;
            }
            
            .counter-number {
                font-size: 0.9em;
            }
            
            .counter-folder {
                font-size: 0.75em;
                max-width: 150px;
            }
        }

        /* Para pantallas muy pequeñas */
        @media (max-width: 480px) {
            .upload-box h1 {
                font-size: 1.4em;
            }
            
            .upload-btn {
                padding: 12px 25px;
                font-size: 0.9em;
            }
            
            .control-btn {
                width: 38px;
                height: 38px;
            }
            
            .progress-bar {
                min-width: 80px;
            }
        }
    </style>
</head>
<body>

    <!-- Pantalla de inicio -->
    <div id="uploadScreen">
        <div class="upload-box">
            <h1>📸 PhotoFlow</h1>
            <p>Carga fotos desde tu dispositivo</p>
            
            <div class="options-grid">
                <div class="option-card" onclick="document.getElementById('folderInput').click()">
                    <div class="icon">📁</div>
                    <h3>Cargar Carpeta</h3>
                    <p>Selecciona una carpeta completa</p>
                </div>
                
                <div class="option-card" onclick="document.getElementById('fileInput').click()">
                    <div class="icon">️</div>
                    <h3>Cargar Fotos</h3>
                    <p>Selecciona fotos individuales</p>
                </div>
            </div>
            
            <input type="file" id="fileInput" multiple accept="image/*">
            <input type="file" id="folderInput" webkitdirectory directory multiple>
            
            <div style="margin-top: 20px;">
                <button class="upload-btn secondary" onclick="document.getElementById('musicInput').click()">
                    🎵 Agregar Música
                </button>
                <input type="file" id="musicInput" accept="audio/*">
            </div>
            
            <div id="fileCount" style="margin-top: 20px; color: #666; font-size: 0.9em;"></div>
        </div>

        <!-- Sección de Historial -->
        <div id="historySection">
            <h2>📚 Historial</h2>
            <div class="history-list" id="historyList">
                <div class="no-history">No hay carpetas en el historial</div>
            </div>
        </div>
    </div>

    <!-- Visor -->
    <div id="viewer">
        <div id="slidesContainer"></div>
        
        <div class="counter" id="counter">
            <div class="counter-number">1 / 1</div>
            <div class="counter-folder">📁 Carpeta</div>
        </div>
        
        <div id="musicControl">
            <span id="musicName">🎵</span>
            <button class="music-btn" onclick="toggleMusic()" id="musicBtn">▶</button>
        </div>
        
        <div id="controls">
            <div class="controls-wrapper">
                <button class="control-btn" onclick="previousSlide()">⏮</button>
                <button class="control-btn" onclick="togglePlay()" id="playBtn">⏸</button>
                <button class="control-btn" onclick="nextSlide()">⏭</button>
                
                <div class="progress-bar" onclick="seekTo(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                
                <div class="speed-control">
                    <span>🐢</span>
                    <input type="range" id="speedRange" min="1" max="10" value="5">
                    <span>🐇</span>
                    <span id="speedValue">5s</span>
                </div>
                
                <button class="control-btn" onclick="toggleFullscreen()">⛶</button>
                <button class="control-btn" onclick="shuffleSlides()">🔀</button>
                <button class="control-btn" onclick="backToHome()">🏠</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" loop></audio>

    <script>
        let images = [];
        let currentIndex = 0;
        let isPlaying = true;
        let slideInterval;
        let slideDuration = 5000;
        let isShuffled = false;
        let originalImages = [];
        let currentFolderName = '';
        let db;

        const uploadScreen = document.getElementById('uploadScreen');
        const viewer = document.getElementById('viewer');
        const fileInput = document.getElementById('fileInput');
        const folderInput = document.getElementById('folderInput');
        const musicInput = document.getElementById('musicInput');
        const slidesContainer = document.getElementById('slidesContainer');
        const playBtn = document.getElementById('playBtn');
        const speedRange = document.getElementById('speedRange');
        const speedValue = document.getElementById('speedValue');
        const counter = document.getElementById('counter');
        const musicControl = document.getElementById('musicControl');
        const audioPlayer = document.getElementById('audioPlayer');
        const progressFill = document.getElementById('progressFill');
        const historySection = document.getElementById('historySection');
        const historyList = document.getElementById('historyList');

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('PhotoFlowDB', 1);
                
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains('folders')) {
                        database.createObjectStore('folders', { keyPath: 'id', autoIncrement: true });
                    }
                };
            });
        }

        async function saveFolderToHistory(folderName, imagesData) {
            try {
                const transaction = db.transaction(['folders'], 'readwrite');
                const store = transaction.objectStore('folders');
                
                const folderData = {
                    name: folderName,
                    date: new Date().toISOString(),
                    images: imagesData
                };
                
                store.add(folderData);
            } catch (error) {
                console.error('Error guardando:', error);
            }
        }

        function getHistory() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['folders'], 'readonly');
                const store = transaction.objectStore('folders');
                const request = store.getAll();
                
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function deleteFromHistory(id) {
            const transaction = db.transaction(['folders'], 'readwrite');
            const store = transaction.objectStore('folders');
            store.delete(id);
        }

        async function loadHistory() {
            try {
                const history = await getHistory();
                
                if (history.length === 0) {
                    historyList.innerHTML = '<div class="no-history">No hay carpetas en el historial</div>';
                    return;
                }
                
                historyList.innerHTML = '';
                history.reverse().forEach(folder => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = `
                        <div class="folder-icon">📁</div>
                        <div class="folder-info">
                            <div class="folder-name">${folder.name}</div>
                            <div class="folder-date">${new Date(folder.date).toLocaleDateString('es-ES')}</div>
                        </div>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteHistoryItem(${folder.id})">✕</button>
                    `;
                    item.onclick = () => loadFromHistory(folder);
                    historyList.appendChild(item);
                });
                
                historySection.classList.add('visible');
            } catch (error) {
                console.error('Error cargando historial:', error);
            }
        }

        async function loadFromHistory(folder) {
            try {
                currentFolderName = folder.name;
                
                images = await Promise.all(folder.images.map(async (imgData) => {
                    const blob = new Blob([imgData.data], { type: imgData.type || 'image/jpeg' });
                    const file = new File([blob], imgData.name, { type: imgData.type || 'image/jpeg' });
                    return file;
                }));
                
                originalImages = [...images];
                startViewer();
            } catch (error) {
                console.error('Error cargando:', error);
                alert('Error al cargar. Intenta de nuevo.');
            }
        }

        async function deleteHistoryItem(id) {
            await deleteFromHistory(id);
            loadHistory();
        }

        fileInput.addEventListener('change', handleFiles);
        folderInput.addEventListener('change', handleFolder);
        musicInput.addEventListener('change', handleMusic);
        
        speedRange.addEventListener('input', (e) => {
            slideDuration = (11 - e.target.value) * 1000;
            speedValue.textContent = e.target.value + 's';
            if (isPlaying) {
                clearInterval(slideInterval);
                slideInterval = setInterval(nextSlide, slideDuration);
            }
        });

        function handleFiles(e) {
            const files = Array.from(e.target.files).filter(file => file.type.startsWith('image/'));
            currentFolderName = 'Fotos seleccionadas';
            loadImages(files);
        }

        function handleFolder(e) {
            const files = Array.from(e.target.files).filter(file => file.type.startsWith('image/'));
            
            if (files.length > 0) {
                const path = files[0].webkitRelativePath;
                currentFolderName = path.split('/')[0];
            } else {
                currentFolderName = 'Carpeta';
            }
            
            loadImages(files);
        }

        function handleMusic(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audioPlayer.src = url;
                document.getElementById('musicName').textContent = '🎵 ' + file.name.substring(0, 15);
                musicControl.classList.add('visible');
                audioPlayer.play();
            }
        }

        async function loadImages(files) {
            images = files;
            originalImages = [...files];
            
            if (images.length === 0) {
                alert('No se encontraron imágenes');
                return;
            }

            document.getElementById('fileCount').textContent = `${images.length} fotos`;
            
            const imagesData = await Promise.all(files.map(async file => {
                const arrayBuffer = await file.arrayBuffer();
                return { 
                    data: arrayBuffer, 
                    name: file.name,
                    type: file.type 
                };
            }));
            
            await saveFolderToHistory(currentFolderName, imagesData);
            
            setTimeout(() => {
                startViewer();
            }, 500);
        }

        function startViewer() {
            uploadScreen.style.opacity = '0';
            setTimeout(() => {
                uploadScreen.style.display = 'none';
                viewer.style.display = 'block';
                counter.classList.add('visible');
                updateCounterDisplay();
                createSlides();
                showSlide(0);
                startSlideshow();
            }, 500);
        }

        function createSlides() {
            slidesContainer.innerHTML = '';
            images.forEach((image, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.dataset.index = index;
                
                const img = document.createElement('img');
                img.src = URL.createObjectURL(image);
                img.alt = image.name;
                
                slide.appendChild(img);
                slidesContainer.appendChild(slide);
            });
        }

        function showSlide(index) {
            const slides = document.querySelectorAll('.slide');
            slides.forEach((slide, i) => {
                slide.classList.remove('active');
                if (i === index) {
                    slide.classList.add('active');
                }
            });
            
            currentIndex = index;
            updateCounterDisplay();
            updateProgress();
        }

        function nextSlide() {
            let nextIndex = currentIndex + 1;
            if (nextIndex >= images.length) {
                nextIndex = 0;
            }
            showSlide(nextIndex);
        }

        function previousSlide() {
            let prevIndex = currentIndex - 1;
            if (prevIndex < 0) {
                prevIndex = images.length - 1;
            }
            showSlide(prevIndex);
        }

        function startSlideshow() {
            isPlaying = true;
            playBtn.textContent = '';
            slideInterval = setInterval(nextSlide, slideDuration);
        }

        function togglePlay() {
            if (isPlaying) {
                clearInterval(slideInterval);
                playBtn.textContent = '▶';
                isPlaying = false;
            } else {
                startSlideshow();
            }
        }

        function toggleMusic() {
            if (audioPlayer.paused) {
                audioPlayer.play();
                document.getElementById('musicBtn').textContent = '⏸';
            } else {
                audioPlayer.pause();
                document.getElementById('musicBtn').textContent = '▶';
            }
        }

        function shuffleSlides() {
            isShuffled = !isShuffled;
            if (isShuffled) {
                for (let i = images.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [images[i], images[j]] = [images[j], images[i]];
                }
            } else {
                images = [...originalImages];
            }
            createSlides();
            showSlide(0);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function seekTo(event) {
            const bar = event.currentTarget;
            const clickPosition = event.offsetX / bar.offsetWidth;
            const newIndex = Math.floor(clickPosition * images.length);
            showSlide(newIndex);
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / images.length) * 100;
            progressFill.style.width = progress + '%';
        }

        function updateCounterDisplay() {
            counter.innerHTML = `
                <div class="counter-number">${currentIndex + 1} / ${images.length}</div>
                <div class="counter-folder">📁 ${currentFolderName}</div>
            `;
        }

        function backToHome() {
            clearInterval(slideInterval);
            viewer.style.display = 'none';
            uploadScreen.style.display = 'flex';
            setTimeout(() => {
                uploadScreen.style.opacity = '1';
                loadHistory();
            }, 100);
        }

        document.addEventListener('keydown', (e) => {
            if (viewer.style.display === 'none') return;
            
            switch(e.key) {
                case 'ArrowRight':
                    nextSlide();
                    break;
                case 'ArrowLeft':
                    previousSlide();
                    break;
                case ' ':
                    togglePlay();
                    break;
                case 'f':
                    toggleFullscreen();
                    break;
                case 'm':
                    toggleMusic();
                    break;
                case 'Escape':
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        backToHome();
                    }
                    break;
            }
        });

        // Soporte para gestos táctiles (swipe)
        let touchStartX = 0;
        let touchEndX = 0;

        viewer.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        viewer.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff =
