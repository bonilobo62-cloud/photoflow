<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhotoFlow - Visor Moderno</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --bg-dark: #1a1a2e;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #16213e 100%);
            color: var(--text-white);
            height: 100vh;
            overflow: hidden;
        }

        /* --- PANTALLA DE INICIO --- */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
            transition: opacity 0.5s;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        h1 { color: var(--primary); margin-bottom: 10px; font-size: 2rem; }
        p.sub { color: #666; margin-bottom: 25px; }

        .btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.02); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }

        input[type="file"] { display: none; }

        /* --- HISTORIAL --- */
        .history-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .history-title { color: var(--primary); margin-bottom: 10px; font-size: 1.1rem; text-align: left;}
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f0f2f5;
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            color: #333;
        }
        .history-item:hover { background: #e4e6eb; }
        .history-item .name { font-weight: bold; flex: 1; text-align: left; margin-right: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-item .delete { background: #ff4757; color: white; border: none; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; font-size: 0.8rem; }

        /* --- VISOR --- */
        #viewer {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 100;
        }

        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        .slide.active { opacity: 1; }
        .slide img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* --- CONTROLES --- */
        #controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #viewer:hover #controls, #viewer:active #controls { opacity: 1; }

        .controls-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .ctrl-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .ctrl-btn:hover { background: rgba(255,255,255,0.4); }

        .progress-bar { width: 100%; max-width: 400px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 5px; width: 0%; transition: width 0.2s; }

        .info-overlay {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem;
            pointer-events: none;
        }

        /* Loading spinner */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: none; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- PANTALLA DE INICIO -->
    <div id="start-screen">
        <div class="card">
            <h1>📸 PhotoFlow</h1>
            <p class="sub">Tu galería personal en el navegador</p>
            
            <button class="btn" onclick="document.getElementById('folderInput').click()">📁 Abrir Carpeta</button>
            <input type="file" id="folderInput" webkitdirectory directory multiple>

            <button class="btn btn-outline" onclick="document.getElementById('fileInput').click()">🖼️ Seleccionar Fotos</button>
            <input type="file" id="fileInput" multiple accept="image/*">

            <div style="margin-top: 15px;">
                <label style="color: #666; font-size: 0.9rem;">🎵 Música de fondo (opcional)</label>
                <input type="file" id="musicInput" accept="audio/*" style="display:block; margin: 5px auto; font-size: 0.8rem; width: 80%;">
            </div>
            
            <div id="loader" class="loader"></div>
        </div>

        <div class="history-container" id="historyContainer">
            <div class="history-title">📂 Historial Reciente</div>
            <div id="historyList">
                <!-- Aquí se cargan las carpetas -->
                <div style="text-align:center; color:#888; padding:10px;">No hay historial aún</div>
            </div>
        </div>
    </div>

    <!-- VISOR DE FOTOS -->
    <div id="viewer">
        <div class="info-overlay" id="folderInfo">Carpeta</div>
        <div id="slidesContainer"></div>
        
        <div id="controls">
            <div class="controls-row">
                <button class="ctrl-btn" onclick="prevSlide()">⏮</button>
                <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()">⏸</button>
                <button class="ctrl-btn" onclick="nextSlide()">⏭</button>
                <button class="ctrl-btn" onclick="toggleMusic()">🎵</button>
                <button class="ctrl-btn" onclick="goHome()"></button>
            </div>
            <div class="progress-bar" onclick="seek(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        
        <audio id="audioPlayer" loop></audio>
    </div>

    <script>
        // --- VARIABLES GLOBALES ---
        let images = [];
        let currentIndex = 0;
        let isPlaying = false;
        let slideTimer = null;
        let slideDuration = 4000; // 4 segundos
        let db = null;
        let musicPlaying = false;

        // --- INICIALIZACIÓN ---
        window.onload = async function() {
            await initDB();
            loadHistory();
            
            // Event Listeners
            document.getElementById('folderInput').addEventListener('change', handleFiles);
            document.getElementById('fileInput').addEventListener('change', handleFiles);
            document.getElementById('musicInput').addEventListener('change', (e) => {
                if(e.target.files[0]) {
                    document.getElementById('audioPlayer').src = URL.createObjectURL(e.target.files[0]);
                    // Auto play music if user selected one
                    // musicPlaying = true; document.getElementById('audioPlayer').play();
                }
            });
        };

        // --- BASE DE DATOS (IndexedDB) ---
        function initDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open("PhotoFlowDB", 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("folders")) {
                        db.createObjectStore("folders", { keyPath: "id", autoIncrement: true });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve();
                };
                request.onerror = () => resolve(); // Fallback si falla
            });
        }

        async function saveFolderToDB(name, filesData) {
            if(!db) return;
            const tx = db.transaction("folders", "readwrite");
            const store = tx.objectStore("folders");
            // Guardamos solo nombre y un array de buffers para reconstruir
            // NOTA: Guardar TODOS los archivos en IndexedDB puede llenar la cuota rápido.
            // Para esta versión, guardaremos los datos en memoria para la sesión actual 
            // y solo el NOMBRE en el historial persistente si son muchos archivos.
            // PERO como pediste historial, intentaremos guardar los blobs.
            
            // Estrategia simplificada para no saturar: Guardar referencia
            // Si quieres que funcione offline real, necesitamos guardar los Blobs.
            // Aquí guardaremos los Blobs completos.
            
            const entry = {
                name: name,
                date: new Date().toLocaleDateString(),
                images: filesData // Array de {name, blob}
            };
            
            store.add(entry);
        }

        function getFoldersFromDB() {
            return new Promise((resolve) => {
                if(!db) { resolve([]); return; }
                const tx = db.transaction("folders", "readonly");
                const store = tx.objectStore("folders");
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result.reverse()); // Más recientes primero
                request.onerror = () => resolve([]);
            });
        }

        function deleteFolderFromDB(id) {
            const tx = db.transaction("folders", "readwrite");
            tx.objectStore("folders").delete(id);
            loadHistory();
        }

        // --- LÓGICA DE ARCHIVOS ---
        async function handleFiles(e) {
            const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
            if (files.length === 0) return;

            document.getElementById('loader').style.display = 'block';

            // Determinar nombre de carpeta
            let folderName = "Fotos Seleccionadas";
            if (files[0].webkitRelativePath) {
                folderName = files[0].webkitRelativePath.split('/')[0];
            }

            // Preparar datos para DB (convertir File a Blob persistente)
            // Nota: File ya es un Blob, pero necesitamos clonarlo o guardarlo tal cual si es posible.
            // IndexedDB puede guardar objetos File directamente.
            
            // Guardar en Historial
            await saveFolderToDB(folderName, files);

            // Iniciar visor
            startSlideshow(files, folderName);
            
            document.getElementById('loader').style.display = 'none';
            // Reset input
            e.target.value = ''; 
        }

        async function loadFromHistory(id) {
            if(!db) return;
            const tx = db.transaction("folders", "readonly");
            const store = tx.objectStore("folders");
            const request = store.get(id);
            
            request.onsuccess = () => {
                const data = request.result;
                if(data) {
                    startSlideshow(data.images, data.name);
                }
            };
        }

        function loadHistory() {
            getFoldersFromDB().then(folders => {
                const list = document.getElementById('historyList');
                list.innerHTML = '';
                if(folders.length === 0) {
                    list.innerHTML = '<div style="text-align:center; color:#888; padding:10px;">No hay historial aún</div>';
                    return;
                }

                folders.forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    // Guardar el ID en un dataset para borrar
                    item.innerHTML = `
                        <span class="name">📁 ${f.name} (${f.date})</span>
                        <button class="delete" onclick="event.stopPropagation(); deleteFolderFromDB(${f.id})">✕</button>
                    `;
                    item.onclick = () => loadFromHistory(f.id);
                    list.appendChild(item);
                });
            });
        }

        // --- VISOR ---
        function startSlideshow(fileList, folderName) {
            images = fileList;
            currentIndex = 0;
            
            // Renderizar slides
            const container = document.getElementById('slidesContainer');
            container.innerHTML = '';
            
            // Limitar renderizado para rendimiento si son muchas fotos?
            // HTML puede manejar miles, pero mejor lazy load en el futuro.
            // Por ahora, creamos todos.
            
            images.forEach((file, index) => {
                const slide = document.createElement('div');
                slide.className = index === 0 ? 'slide active' : 'slide';
                slide.id = `slide-${index}`;
                
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.loading = index > 10 ? "lazy" : "eager"; // Lazy load para fotos lejanas
                
                slide.appendChild(img);
                container.appendChild(slide);
            });

            document.getElementById('folderInfo').textContent = `📁 ${folderName} | ${images.length} fotos`;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('viewer').style.display = 'block';
            
            play();
        }

        function showSlide(index) {
            // Ocultar actual
            const currentSlide = document.getElementById(`slide-${currentIndex}`);
            if(currentSlide) currentSlide.classList.remove('active');
            
            // Mostrar nuevo
            currentIndex = index;
            const nextSlide = document.getElementById(`slide-${currentIndex}`);
            if(nextSlide) nextSlide.classList.add('active');
            
            updateProgress();
        }

        function nextSlide() {
            let next = currentIndex + 1;
            if(next >= images.length) next = 0;
            showSlide(next);
        }

        function prevSlide() {
            let prev = currentIndex - 1;
            if(prev < 0) prev = images.length - 1;
            showSlide(prev);
        }

        function play() {
            isPlaying = true;
            document.getElementById('playPauseBtn').textContent = '⏸';
            clearInterval(slideTimer);
            slideTimer = setInterval(nextSlide, slideDuration);
        }

        function pause() {
            isPlaying = false;
            document.getElementById('playPauseBtn').textContent = '▶';
            clearInterval(slideTimer);
        }

        function togglePlay() {
            if(isPlaying) pause(); else play();
        }

        function toggleMusic() {
            const audio = document.getElementById('audioPlayer');
            if(audio.src) {
                if(audio.paused) { audio.play(); musicPlaying = true; }
                else { audio.pause(); musicPlaying = false; }
            } else {
                alert("No has seleccionado música.");
            }
        }

        function goHome() {
            pause();
            document.getElementById('viewer').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
            loadHistory(); // Refrescar historial
        }

        function updateProgress() {
            const percent = ((currentIndex + 1) / images.length) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
        }

        function seek(e) {
            const bar = e.currentTarget;
            const clickPosition = e.offsetX / bar.offsetWidth;
            const targetIndex = Math.floor(clickPosition * images.length);
            showSlide(targetIndex);
        }

        // Gestos Táctiles (Swipe)
        let touchStartX = 0;
        document.getElementById('viewer').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });
        document.getElementById('viewer').addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) nextSlide();
            if (touchEndX - touchStartX > 50) prevSlide();
        });

    </script>
</body>
</html>
